name: Migrate Data from Supabase

on:
  # 手動実行のみ
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Run migration script
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_QUESTIONS_DB_ID: ${{ secrets.NOTION_QUESTIONS_DB_ID }}
          NOTION_ANSWERS_DB_ID: ${{ secrets.NOTION_ANSWERS_DB_ID }}
        run: npm run migrate