name: Update Question Titles in Notion

on:
  workflow_dispatch: # 手動実行のみ

jobs:
  update-titles:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Run update_question_titles script
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_QUESTIONS_DB_ID: ${{ secrets.NOTION_QUESTIONS_DB_ID }}
        run: npm run update-question-titles