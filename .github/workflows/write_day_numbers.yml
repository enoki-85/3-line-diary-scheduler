name: Write Day Numbers to Notion

on:
  workflow_dispatch: # Manual trigger only

jobs:
  write-day-numbers:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Run write_day_numbers script
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_QUESTIONS_DB_ID: ${{ secrets.NOTION_QUESTIONS_DB_ID }}
        run: npm run write-day-numbers